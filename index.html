<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Taller Motos — Gestión</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  /* ===================== Tema / variables ===================== */
  :root{
    --bg:#0b1220;        /* fondo página, azul muy oscuro */
    --bg-2:#0f172a;      /* sidebar */
    --surface:#16213a;   /* tarjetas / paneles */
    --surface-2:#1e293b;
    --surface-3:#243149;
    --border:#27324a;
    --text:#e6edf6;
    --text-dim:#9fb0cc;
    --muted:#6b7a96;
    --accent:#f97316;    /* naranja taller */
    --accent-2:#fb923c;
    --accent-soft:rgba(249,115,22,.14);
    --blue:#3b82f6;
    --green:#22c55e;
    --amber:#f59e0b;
    --red:#ef4444;
    --cyan:#06b6d4;
    --radius:14px;
    --radius-sm:9px;
    --shadow:0 12px 34px rgba(0,0,0,.40);
    --font:'Inter',ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
  }

  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:var(--font);
    background:radial-gradient(1200px 600px at 80% -10%, #122038 0%, var(--bg) 55%);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    font-size:14.5px;
  }
  a{color:inherit}
  button{font-family:inherit}

  /* ===================== Layout ===================== */
  .app{display:flex;min-height:100vh}

  .sidebar{
    width:248px;min-width:248px;
    background:linear-gradient(180deg,#0f1a30 0%, var(--bg-2) 100%);
    border-right:1px solid var(--border);
    display:flex;flex-direction:column;
    position:sticky;top:0;height:100vh;
  }
  .brand{
    display:flex;align-items:center;gap:12px;
    padding:20px 18px 16px;border-bottom:1px solid var(--border);
  }
  .brand .logo{
    width:40px;height:40px;border-radius:11px;flex:none;
    background:linear-gradient(135deg,var(--accent),#ea580c);
    display:grid;place-items:center;color:#fff;font-size:20px;
    box-shadow:0 6px 16px rgba(249,115,22,.4);
  }
  .brand h1{font-size:15px;margin:0;line-height:1.15;font-weight:700;letter-spacing:.2px}
  .brand span{font-size:11.5px;color:var(--text-dim);font-weight:500}

  .nav{padding:12px 10px;overflow-y:auto;flex:1}
  .nav-group-label{
    font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;
    color:var(--muted);font-weight:700;margin:14px 12px 6px;
  }
  .nav-item{
    display:flex;align-items:center;gap:12px;width:100%;
    padding:10px 12px;margin:2px 0;border:0;background:transparent;
    color:var(--text-dim);border-radius:10px;cursor:pointer;
    font-size:14px;font-weight:500;text-align:left;transition:.15s;
  }
  .nav-item:hover{background:var(--surface-2);color:var(--text)}
  .nav-item.active{background:var(--accent-soft);color:var(--accent-2);font-weight:600}
  .nav-item.active .ic{color:var(--accent)}
  .nav-item .ic{width:20px;text-align:center;font-size:16px;flex:none;color:var(--muted)}
  .nav-item .count{
    margin-left:auto;background:var(--surface-3);color:var(--text-dim);
    font-size:11px;font-weight:700;border-radius:20px;padding:1px 8px;min-width:22px;text-align:center;
  }
  .nav-item.active .count{background:var(--accent);color:#1a1207}

  .sidebar-foot{padding:12px 14px;border-top:1px solid var(--border);font-size:11.5px;color:var(--muted)}
  .sync-pill{
    display:inline-flex;align-items:center;gap:7px;
    background:var(--surface-2);border:1px solid var(--border);
    padding:6px 10px;border-radius:20px;color:var(--text-dim);font-weight:600;font-size:11.5px;
  }
  .dot{width:8px;height:8px;border-radius:50%;background:var(--amber);box-shadow:0 0 0 3px rgba(245,158,11,.18)}

  /* ===================== Contenido ===================== */
  .content{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{
    display:flex;align-items:center;gap:16px;
    padding:18px 26px;border-bottom:1px solid var(--border);
    position:sticky;top:0;background:rgba(11,18,32,.82);backdrop-filter:blur(10px);z-index:5;
  }
  .topbar h2{margin:0;font-size:19px;font-weight:700}
  .topbar .sub{color:var(--text-dim);font-size:12.5px;margin-top:2px}
  .topbar .spacer{flex:1}

  .view-wrap{padding:24px 26px 60px;max-width:1180px;width:100%}
  .view{display:none}
  .view.active{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* ===================== Componentes ===================== */
  .btn{
    display:inline-flex;align-items:center;gap:8px;
    border:1px solid var(--border);background:var(--surface-2);color:var(--text);
    padding:9px 15px;border-radius:10px;cursor:pointer;font-size:13.5px;font-weight:600;transition:.15s;
  }
  .btn:hover{background:var(--surface-3);border-color:#33415c}
  .btn.primary{background:linear-gradient(135deg,var(--accent),#ea580c);border-color:transparent;color:#fff;box-shadow:0 6px 16px rgba(249,115,22,.3)}
  .btn.primary:hover{filter:brightness(1.06)}
  .btn.ghost{background:transparent}
  .btn.danger{color:var(--red);border-color:transparent;background:transparent}
  .btn.danger:hover{background:rgba(239,68,68,.12)}
  .btn.sm{padding:6px 11px;font-size:12.5px}
  .btn.icon{padding:7px 9px}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
  .toolbar{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .toolbar .spacer{flex:1}

  .field{position:relative}
  .input,.select{
    width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);
    padding:10px 12px;border-radius:10px;font-size:13.5px;outline:none;transition:.15s;
  }
  .input::placeholder{color:var(--muted)}
  .input:focus,.select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .search{max-width:320px}
  .search .input{padding-left:36px}
  .search .mag{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px}

  table{width:100%;border-collapse:collapse}
  thead th{
    text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.08em;
    color:var(--muted);font-weight:700;padding:12px 16px;border-bottom:1px solid var(--border);
  }
  tbody td{padding:13px 16px;border-bottom:1px solid var(--border);font-size:13.5px;vertical-align:middle}
  tbody tr:last-child td{border-bottom:0}
  tbody tr:hover{background:rgba(255,255,255,.02)}
  .t-main{font-weight:600}
  .t-sub{color:var(--text-dim);font-size:12px;margin-top:2px}
  .row-actions{display:flex;gap:4px;justify-content:flex-end}

  .tag{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700;border:1px solid transparent}
  .tag.blue{background:rgba(59,130,246,.14);color:#7fb0ff}
  .tag.orange{background:var(--accent-soft);color:var(--accent-2)}
  .tag.gray{background:var(--surface-3);color:var(--text-dim)}

  .empty{text-align:center;padding:54px 20px;color:var(--text-dim)}
  .empty .big{font-size:46px;margin-bottom:8px;opacity:.5}
  .empty h3{margin:0 0 6px;color:var(--text);font-weight:700}
  .empty p{margin:0 auto 18px;max-width:380px;font-size:13.5px}

  /* Dashboard */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:22px}
  .stat{padding:18px 18px 16px;display:flex;flex-direction:column;gap:8px}
  .stat .lbl{color:var(--text-dim);font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:8px}
  .stat .lbl .ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-size:15px}
  .stat .val{font-size:30px;font-weight:800;letter-spacing:-.5px}
  .stat .foot{font-size:11.5px;color:var(--muted)}
  .ic-orange{background:var(--accent-soft);color:var(--accent-2)}
  .ic-blue{background:rgba(59,130,246,.14);color:#7fb0ff}
  .ic-green{background:rgba(34,197,94,.14);color:#5fe08a}
  .ic-cyan{background:rgba(6,182,212,.14);color:#4dd6ec}

  .panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:880px){.panel-grid{grid-template-columns:1fr}}
  .panel-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--border)}
  .panel-head h3{margin:0;font-size:14.5px;font-weight:700}

  /* Ficha de moto */
  .detail-head{display:flex;align-items:flex-start;gap:18px;padding:22px;flex-wrap:wrap}
  .moto-avatar{
    width:64px;height:64px;border-radius:14px;flex:none;display:grid;place-items:center;font-size:30px;
    background:linear-gradient(135deg,#1e293b,#0f172a);border:1px solid var(--border);
  }
  .detail-head h2{margin:0;font-size:22px;font-weight:800}
  .spec-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1px;background:var(--border);border-top:1px solid var(--border)}
  .spec{background:var(--surface);padding:14px 18px}
  .spec .k{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:700;margin-bottom:4px}
  .spec .v{font-size:14.5px;font-weight:600}
  .km-badge{background:var(--accent-soft);color:var(--accent-2);font-weight:800;padding:4px 12px;border-radius:10px;font-size:14px}

  /* ===================== Modal ===================== */
  #modal-root{position:fixed;inset:0;display:none;z-index:50}
  #modal-root.open{display:block}
  .modal-overlay{position:absolute;inset:0;background:rgba(3,7,18,.66);backdrop-filter:blur(3px);display:grid;place-items:center;padding:20px;animation:fade .18s ease}
  .modal{width:100%;max-width:520px;background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);max-height:90vh;display:flex;flex-direction:column;animation:pop .2s ease}
  @keyframes pop{from{transform:scale(.96);opacity:0}to{transform:none;opacity:1}}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border)}
  .modal-head h3{margin:0;font-size:16px;font-weight:700}
  .modal-body{padding:20px;overflow-y:auto}
  .modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:16px 20px;border-top:1px solid var(--border)}
  .icon-btn{background:transparent;border:0;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;padding:2px 6px;border-radius:8px}
  .icon-btn:hover{background:var(--surface-2);color:var(--text)}

  .form-row{margin-bottom:14px}
  .form-row.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  label.lbl{display:block;font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:6px}
  label.lbl .req{color:var(--accent)}
  .hint{font-size:11.5px;margin-top:5px;color:var(--muted)}
  .hint.err{color:var(--red)}
  .input.invalid{border-color:var(--red)}

  /* Toast */
  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;
    background:var(--surface-3);border:1px solid var(--border);color:var(--text);padding:11px 18px;border-radius:12px;
    font-size:13.5px;font-weight:600;box-shadow:var(--shadow);z-index:80;transition:.25s;pointer-events:none}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast .check{color:var(--green);margin-right:8px}

  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#243149;border-radius:10px;border:2px solid transparent;background-clip:padding-box}

  /* ===================== Informe (hoja imprimible) ===================== */
  .paper{background:#fff;color:#15233f;border-radius:10px;max-width:980px;margin:0 auto;padding:30px 34px;box-shadow:var(--shadow);font-size:13px}
  .paper-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #15233f;padding-bottom:14px;margin-bottom:16px}
  .paper-title{font-size:26px;font-weight:800;letter-spacing:-.5px}
  .paper-date{color:#555;font-size:12px;margin-top:4px}
  .paper-cols{display:grid;grid-template-columns:1fr 1.6fr;gap:18px;margin-bottom:18px}
  .paper-info{display:flex;flex-direction:column;gap:2px;font-size:14px}
  .paper-tbl{width:100%;border-collapse:collapse;border:1px solid #cbd3e1}
  .paper-tbl th{background:#eef1f7;padding:7px 10px;font-size:11px;border:1px solid #cbd3e1}
  .paper-tbl td{padding:7px 10px;border:1px solid #cbd3e1}
  .paper-tbl td.num{text-align:right;white-space:nowrap}
  .paper-tbl tfoot td{background:#f6f8fc}
  .paper-check{width:100%;border-collapse:collapse;margin:6px 0 16px;border:1px solid #cbd3e1}
  .paper-check th{background:#15233f;color:#fff;padding:6px 8px;font-size:10.5px;text-align:left;border:1px solid #2c3c5c}
  .paper-check td{padding:5px 8px;border:1px solid #d7dde8;font-size:11px;vertical-align:top}
  .paper-check tr:nth-child(even) td{background:#f7f9fc}
  .paper-obs{border:1px solid #cbd3e1;border-radius:6px;padding:10px 12px;margin-top:10px}
  .paper-obs-h{font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#555;margin-bottom:4px}

  @media print{
    body{background:#fff}
    .sidebar,.topbar,#topbar-action{display:none !important}
    .content{margin:0}
    .view-wrap{padding:0;max-width:none}
    .view{display:none !important}
    #view-informe-doc.view{display:block !important}
    .paper{box-shadow:none;max-width:none;border-radius:0;padding:0}
    .paper-check th{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }

  /* ===================== Estado de sincronización ===================== */
  .btn[disabled]{opacity:.45;cursor:not-allowed}
  .btn[disabled]:hover{transform:none;background:var(--surface-2);border-color:var(--border)}
  .sync-status{padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;border:1px solid var(--border)}
  .sync-ok{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.4);color:#6ee7a0}
  .sync-err{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.4);color:#fca5a5}
  .sync-info{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.4);color:#93c5fd}
  .sync-warn{background:var(--accent-soft);border-color:rgba(249,115,22,.4);color:var(--accent-2)}
</style>
</head>
<body>
<div class="app">
  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">&#128295;</div>
      <div>
        <h1>Taller Motos</h1>
        <span>Gestión de servicios</span>
      </div>
    </div>
    <nav class="nav" id="nav">
      <button class="nav-item" data-view="dashboard"><span class="ic">&#128202;</span> Dashboard</button>

      <div class="nav-group-label">Registro</div>
      <button class="nav-item" data-view="clientes"><span class="ic">&#128100;</span> Clientes <span class="count" id="cnt-clientes">0</span></button>
      <button class="nav-item" data-view="motos"><span class="ic">&#127949;</span> Motos <span class="count" id="cnt-motos">0</span></button>

      <div class="nav-group-label">Operación</div>
      <button class="nav-item" data-view="ot"><span class="ic">&#128203;</span> Órdenes de Trabajo <span class="count" id="cnt-ot">0</span></button>
      <button class="nav-item" data-view="tareas"><span class="ic">&#9989;</span> Tareas</button>
      <button class="nav-item" data-view="presupuestos"><span class="ic">&#128181;</span> Presupuestos</button>
      <button class="nav-item" data-view="informes"><span class="ic">&#128228;</span> Informes</button>

      <button class="nav-item" style="margin-bottom:8px" onclick="openTallerConfig()"><span class="ic">&#9881;</span> Datos del taller</button>

  <!-- ============ CONTENIDO ============ -->
  <div class="content">
    <header class="topbar">
      <div>
        <h2 id="view-title">Dashboard</h2>
        <div class="sub" id="view-sub">Resumen del taller</div>

      <div class="spacer"></div>

    <div class="view-wrap">
      <!-- DASHBOARD -->

<script>
/* =========================================================================
   TALLER MOTOS — App de gestión (single-file)
   Fase 1: Clientes + Ficha Motos sobre localStorage.
   La capa Store está abstraída a propósito: en la Fase 2 se enchufa el
   backend (Google Apps Script web app) como FUENTE DE VERDAD para soporte
   multi-dispositivo, dejando localStorage como caché/offline. No reescribir
   los módulos: solo implementar Sync.push()/Sync.pull() y llamar a Store.
   ========================================================================= */

/* ----------------------------- Utilidades ------------------------------ */
const $  = (s,el=document)=>el.querySelector(s);
const $$ = (s,el=document)=>Array.from(el.querySelectorAll(s));

function uid(){
  return (window.crypto && crypto.randomUUID)
    ? crypto.randomUUID()
    : 'id-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,8);
}
function esc(s){
  return String(s==null?'':s).replace(/[&<>"']/g,c=>(
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function formatCLP(n){ n=Number(n)||0; return '$'+n.toLocaleString('es-CL'); }
function todayISO(){ return new Date().toISOString().slice(0,10); }

/* RUT chileno: limpieza, validación módulo 11 y formato */
function cleanRut(r){ return String(r||'').replace(/[^0-9kK]/g,'').toUpperCase(); }
function validateRut(r){
  r=cleanRut(r); if(r.length<2) return false;
  const body=r.slice(0,-1), dv=r.slice(-1);
  if(!/^\d+$/.test(body)) return false;
  let sum=0, mul=2;
  for(let i=body.length-1;i>=0;i--){ sum+=parseInt(body[i],10)*mul; mul=mul===7?2:mul+1; }
  const res=11-(sum%11);
  const calc=res===11?'0':res===10?'K':String(res);
  return calc===dv;
}
function formatRut(r){
  r=cleanRut(r); if(r.length<2) return r;
  const body=r.slice(0,-1), dv=r.slice(-1);
  return body.replace(/\B(?=(\d{3})+(?!\d))/g,'.')+'-'+dv;
}

function toast(msg){
  const t=$('#toast');
  t.innerHTML='<span class="check">&#10003;</span>'+esc(msg);
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t=setTimeout(()=>t.classList.remove('show'),2200);
}

/* ------------------------------- STORE --------------------------------- */
const Store = {
  KEY:'tallerMotos.v1',
  data:{ clientes:[], motos:[], ots:[], tareas:[], items:[], config:{} },

  load(){
    try{
      const raw=localStorage.getItem(this.KEY);
      if(raw){ this.data=Object.assign({clientes:[],motos:[],ots:[],tareas:[],items:[],config:{}}, JSON.parse(raw)); }
    }catch(e){ console.warn('Store.load falló, se usa estado vacío',e); }
    if(!this.data.config) this.data.config={};
  },
  config(){ return this.data.config||(this.data.config={}); },
  setConfig(patch){ this.data.config=Object.assign({}, this.data.config, patch); this.save(); },
  save(){
    localStorage.setItem(this.KEY, JSON.stringify(this.data));
    // Fase 2: Sync.push() — encolar cambios hacia el Apps Script web app.
  },

  all(col){ return this.data[col]||[]; },
  get(col,id){ return (this.data[col]||[]).find(x=>x.id===id)||null; },
  insert(col,obj){
    obj.id=obj.id||uid(); obj.createdAt=obj.createdAt||Date.now();
    this.data[col].push(obj); this.save(); return obj;
  },
  update(col,id,patch){
    const x=this.get(col,id); if(!x) return null;
    Object.assign(x,patch,{updatedAt:Date.now()}); this.save(); return x;
  },
  remove(col,id){
    this.data[col]=this.data[col].filter(x=>x.id!==id); this.save();
  },

  /* Relaciones */
  motosDeCliente(clienteId){ return this.all('motos').filter(m=>m.clienteId===clienteId); },
  otsDeMoto(motoId){ return this.all('ots').filter(o=>o.motoId===motoId); },
  clienteDeMoto(motoId){ const m=this.get('motos',motoId); return m?this.get('clientes',m.clienteId):null; },

  /* Export / import — útil ya hoy y como respaldo manual */
  exportJSON(){ return JSON.stringify(this.data,null,2); },
};

const OT_ESTADOS = ['Recibida','En Proceso','Lista','Entregada'];

/* ------------------------------ Router --------------------------------- */
const TITLES = {
  dashboard:['Dashboard','Resumen del taller'],
  clientes:['Clientes','Dueños de las motos'],
  motos:['Motos','Ficha técnica e historial'],
  'moto-detail':['Ficha de Moto','Detalle, dueños e historial de mantenciones'],
  ot:['Órdenes de Trabajo','Servicios por visita'],
  'ot-detail':['Orden de Trabajo','Detalle y checklist'],
  tareas:['Tareas pendientes','Avance de las OTs activas'],
  presupuestos:['Presupuestos','Trabajos, totales y estado de pago'],
  informes:['Informes al cliente','Ficha de servicio y envío'],
  'informe-doc':['Informe','Ficha de Servicio para el cliente'],
  sync:['Sincronización','Respaldo y datos compartidos con Google Sheets'],
};
const NAV_FOR = { 'moto-detail':'motos', 'ot-detail':'ot', 'informe-doc':'informes' }; // qué item del menú resaltar

const state = { view:'dashboard', params:{} };

function navigate(view, params={}){
  state.view=view; state.params=params;
  const navKey = NAV_FOR[view]||view;
  $$('.nav-item').forEach(n=>n.classList.toggle('active', n.dataset.view===navKey));
  $$('.view').forEach(v=>v.classList.remove('active'));
  const el=document.getElementById('view-'+view);
  if(el) el.classList.add('active');
  const t=TITLES[view]||['',''];
  $('#view-title').textContent=t[0];
  $('#view-sub').textContent=t[1];
  $('#topbar-action').innerHTML='';
  renderView(view);
  window.scrollTo(0,0);
}

function renderView(view){
  switch(view){
    case 'dashboard':   renderDashboard(); break;
    case 'clientes':    renderClientes(); break;
    case 'motos':       renderMotos(); break;
    case 'moto-detail': renderMotoDetail(state.params.id); break;
    case 'ot':          renderOT(); break;
    case 'ot-detail':   renderOTDetail(state.params.id); break;
    case 'tareas':      renderTareas(); break;
    case 'presupuestos':renderPresupuestos(); break;
    case 'informes':    renderInformes(); break;
    case 'informe-doc': renderInformeDoc(state.params.id); break;
    case 'sync':        renderSync(); break;
  }
  refreshCounts();
}

function refreshCounts(){
  $('#cnt-clientes').textContent=Store.all('clientes').length;
  $('#cnt-motos').textContent=Store.all('motos').length;
  $('#cnt-ot').textContent=Store.all('ots').length;
}

/* ------------------------------- Modal --------------------------------- */
function openModal(title, bodyHTML, footHTML){
  $('#modal-root').innerHTML = `
    <div class="modal-overlay">
      <div class="modal" role="dialog" aria-modal="true">
        <div class="modal-head">
          <h3>${esc(title)}</h3>
          <button class="icon-btn" data-close aria-label="Cerrar">&times;</button>
        </div>
        <div class="modal-body">${bodyHTML}</div>
        ${footHTML?`<div class="modal-foot">${footHTML}</div>`:''}
      </div>
    </div>`;
  $('#modal-root').classList.add('open');
}
function closeModal(){ const r=$('#modal-root'); r.classList.remove('open'); r.innerHTML=''; }
document.addEventListener('click',e=>{
  // Cerrar solo al hacer clic en el fondo oscuro, o en un botón marcado con data-close.
  // (Antes el overlay tenía data-close y, al envolver el formulario, cualquier clic dentro cerraba el modal.)
  if(e.target.classList && e.target.classList.contains('modal-overlay')){ closeModal(); return; }
  if(e.target.closest('[data-close]')) closeModal();
});
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

function confirmDialog(msg, onYes, yesLabel='Eliminar'){
  openModal('Confirmar',
    `<p style="margin:0;color:var(--text-dim);line-height:1.5">${esc(msg)}</p>`,
    `<button class="btn" data-close>Cancelar</button>
     <button class="btn primary" id="confirm-yes" style="background:linear-gradient(135deg,var(--red),#b91c1c);box-shadow:none">${esc(yesLabel)}</button>`);
  $('#confirm-yes').onclick=()=>{ onYes(); closeModal(); };
}

function openClienteForm(id){
  const c = id?Store.get('clientes',id):{};
  openModal(id?'Editar cliente':'Nuevo cliente', `
    <form id="cli-form">
      <div class="form-row">
        <label class="lbl">Nombre completo <span class="req">*</span></label>
        <input class="input" name="nombre" value="${esc(c.nombre||'')}" required autofocus>
      </div>
      <div class="form-row">
        <label class="lbl">RUT</label>
        <input class="input" name="rut" value="${esc(c.rut?formatRut(c.rut):'')}" placeholder="12.345.678-9">
        <div class="hint" id="rut-hint">Se valida el dígito verificador (módulo 11).</div>
      </div>
      <div class="form-row two">
        <div>
          <label class="lbl">Teléfono</label>
          <input class="input" name="telefono" value="${esc(c.telefono||'')}" placeholder="+56 9 …">
        </div>
        <div>
          <label class="lbl">Email</label>
          <input class="input" name="email" type="email" value="${esc(c.email||'')}" placeholder="cliente@correo.cl">
        </div>
      </div>
    </form>`,
    `<button class="btn" data-close>Cancelar</button>
     <button class="btn primary" id="cli-save">Guardar</button>`);

  const form=$('#cli-form');
  const save=()=>{
    const fd=new FormData(form);
    const nombre=(fd.get('nombre')||'').trim();
    const rutRaw=(fd.get('rut')||'').trim();
    if(!nombre){ toast('El nombre es obligatorio'); return; }
    if(rutRaw && !validateRut(rutRaw)){
      const h=$('#rut-hint'); h.textContent='RUT inválido: revisa el dígito verificador.'; h.classList.add('err');
      form.rut.classList.add('invalid'); return;
    }
    const payload={ nombre, rut:rutRaw?cleanRut(rutRaw):'', telefono:(fd.get('telefono')||'').trim(), email:(fd.get('email')||'').trim() };
    if(id) Store.update('clientes',id,payload); else Store.insert('clientes',payload);
    closeModal(); renderView(state.view); toast(id?'Cliente actualizado':'Cliente creado');
  };
  $('#cli-save').onclick=save;
  form.onsubmit=e=>{ e.preventDefault(); save(); };
}

function eliminarCliente(id){
  const c=Store.get('clientes',id); if(!c) return;
  const nMotos=Store.motosDeCliente(id).length;
  const extra=nMotos?` Tiene ${nMotos} moto(s) asociada(s) que también se eliminarán.`:'';
  confirmDialog(`¿Eliminar a "${c.nombre}"?${extra} Esta acción no se puede deshacer.`, ()=>{
    Store.motosDeCliente(id).forEach(m=>Store.remove('motos',m.id));
    Store.remove('clientes',id);
    renderView(state.view); toast('Cliente eliminado');
  });
}

/* --- Presupuesto / cobro --- */
function itemsDeOT(otId){ return Store.all('items').filter(x=>x.otId===otId); }
function totalOT(otId){ return itemsDeOT(otId).reduce((s,x)=>s+(Number(x.monto)||0),0); }
function estadoPagoOT(o){ return o.estadoPago||'Pendiente'; }

/* --- Datos del taller (encabezado del informe) --- */
function taller(){ const c=Store.config(); return {nombre:c.nombre||'Ficha de Servicio', mecanico:c.mecanico||'', telefono:c.telefono||''}; }
function telWa(tel){ return String(tel||'').replace(/[^0-9]/g,''); } // solo dígitos para wa.me

function nextFolio(){
  const nums=Store.all('ots').map(o=>{ const mm=/(\d+)/.exec(o.folio||''); return mm?parseInt(mm[1],10):0; });
  return 'OT-'+String((nums.length?Math.max(...nums):0)+1).padStart(4,'0');
}
function tareasDeOT(otId){ return Store.all('tareas').filter(t=>t.otId===otId); }
function progresoOT(otId){
  const ts=tareasDeOT(otId), hechas=ts.filter(t=>t.hecha).length;
  return {hechas, total:ts.length, pct: ts.length?Math.round(hechas/ts.length*100):0};
}

/* --- Dueños: transferencia conservando el historial de la moto --- */
function ensureOwnerHistory(m){
  if(!Array.isArray(m.historialDuenos)){
    m.historialDuenos = m.clienteId
      ? [{clienteId:m.clienteId, desde:(m.createdAt?new Date(m.createdAt).toISOString().slice(0,10):todayISO()), hasta:null}]
      : [];
  }
  return m.historialDuenos;
}
function setOwner(motoId, newClienteId){
  const m=Store.get('motos',motoId); if(!m||!newClienteId) return;
  ensureOwnerHistory(m);
  if(m.clienteId===newClienteId){ Store.save(); return; }
  const f=todayISO();
  const cur=m.historialDuenos.find(h=>h.hasta===null||h.hasta===undefined);
  if(cur) cur.hasta=f;
  m.historialDuenos.push({clienteId:newClienteId, desde:f, hasta:null});
  m.clienteId=newClienteId;
  Store.save();
}
function openTransferModal(motoId){
  const m=Store.get('motos',motoId); if(!m) return;
  const actual=Store.get('clientes',m.clienteId);
  const clientes=Store.all('clientes').filter(c=>c.id!==m.clienteId).sort((a,b)=>a.nombre.localeCompare(b.nombre));
  if(!clientes.length){
    openModal('Transferir moto',
      `<p style="margin:0;color:var(--text-dim);line-height:1.5">No hay otro cliente al que transferir. Crea primero el nuevo dueño en <strong>Clientes</strong> y vuelve a intentarlo.</p>`,
      `<button class="btn" data-close>Cerrar</button>`);
    return;
  }
  openModal('Transferir / vender moto', `
    <p style="margin:0 0 14px;color:var(--text-dim);font-size:13px;line-height:1.5">
      Dueño actual: <strong style="color:var(--text)">${esc(actual?actual.nombre:'—')}</strong>.<br>
      La moto conserva todo su historial de mantenciones; solo cambia el dueño a partir de hoy.
    </p>
    <form id="transfer-form">
      <div class="form-row">
        <label class="lbl">Nuevo dueño <span class="req">*</span></label>
        <select class="select" name="nuevo" required>
          <option value="">— Seleccionar cliente —</option>
          ${clientes.map(c=>`<option value="${c.id}">${esc(c.nombre)}</option>`).join('')}
        </select>
      </div>
    </form>`,
    `<button class="btn" data-close>Cancelar</button>
     <button class="btn primary" id="transfer-save">Transferir</button>`);
  $('#transfer-save').onclick=()=>{
    const nuevo=$('#transfer-form').nuevo.value;
    if(!nuevo){ toast('Selecciona el nuevo dueño'); return; }
    setOwner(motoId, nuevo);
    closeModal(); renderMotoDetail(motoId); toast('Moto transferida');
  };
}

    <form id="ot-form">
      <div class="form-row">
        <label class="lbl">Moto <span class="req">*</span></label>
        <select class="select" name="motoId" ${id?'disabled':'required'}>
          <option value="">— Seleccionar moto —</option>
          ${motos.map(m=>{const c=Store.get('clientes',m.clienteId);return `<option value="${m.id}" ${m.id===selMoto?'selected':''}>${esc(m.marca+' '+m.modelo)} — ${esc(m.patente||'s/patente')} (${esc(c?c.nombre:'—')})</option>`;}).join('')}
        </select>
      </div>
      <div class="form-row two">
        <div><label class="lbl">Tipo de servicio <span class="req">*</span></label>
          <select class="select" name="tipo" required>
            ${tipos.map(t=>`<option value="${t}" ${o.tipo===t?'selected':''}>${t}</option>`).join('')}
          </select></div>
        <div><label class="lbl">Estado</label>
          <select class="select" name="estado">
            ${OT_ESTADOS.map(e=>`<option value="${e}" ${(o.estado||'Recibida')===e?'selected':''}>${e}</option>`).join('')}
          </select></div>
      </div>
      <div class="form-row two">
        <div><label class="lbl">KM de ingreso</label>
          <input class="input" name="kmIngreso" type="number" min="0" value="${esc(o.kmIngreso||'')}"></div>
        <div><label class="lbl">Mecánico responsable</label>
          <input class="input" name="mecanico" list="mec-list" value="${esc(o.mecanico||'')}" placeholder="Nombre">
          <datalist id="mec-list">${mecanicos.map(x=>`<option value="${esc(x)}"></option>`).join('')}</datalist></div>
      </div>
      <div class="form-row two">
        <div><label class="lbl">Fecha de ingreso</label>
          <input class="input" name="fechaIngreso" type="date" value="${esc(o.fechaIngreso||todayISO())}"></div>
        <div><label class="lbl">Entrega estimada</label>
          <input class="input" name="fechaEntrega" type="date" value="${esc(o.fechaEntrega||'')}"></div>
      </div>
      <div class="form-row">
        <label class="lbl">Descripción del problema / trabajo</label>
        <textarea class="input" name="descripcion" rows="3" style="resize:vertical">${esc(o.descripcion||'')}</textarea>
      </div>
      <div class="form-row">
        <label class="lbl">Observaciones (recomendaciones para el cliente / próximo servicio)</label>
        <textarea class="input" name="observaciones" rows="2" style="resize:vertical">${esc(o.observaciones||'')}</textarea>
      </div>
      <div class="form-row">
        <label class="lbl">Link a fotos (Google Photos / Drive)</label>
        <input class="input" name="linkFotos" value="${esc(o.linkFotos||'')}" placeholder="https://...">
      </div>
      ${id?'':'<div class="hint">Si eliges <strong>Mantención Preventiva</strong>, se crea automáticamente el checklist estándar (editable).</div>'}
    </form>`,
    `<button class="btn" data-close>Cancelar</button>
     <button class="btn primary" id="ot-save">Guardar</button>`);

  const form=$('#ot-form');
  if(!id){
    const motoSel=form.motoId, kmInp=form.kmIngreso;
    const setKm=()=>{ const m=Store.get('motos',motoSel.value); if(m && !kmInp.value) kmInp.value=m.kmActual||''; };
    motoSel.onchange=setKm; setKm();
  }
  const save=()=>{
    const fd=new FormData(form);
    const motoId=id?o.motoId:fd.get('motoId');
    if(!motoId){ toast('Selecciona la moto'); return; }
    const moto=Store.get('motos',motoId);
    const payload={
      motoId,
      clienteId: id? o.clienteId : (moto?moto.clienteId:''),
      tipo: fd.get('tipo'),
      estado: fd.get('estado')||'Recibida',
      kmIngreso: Number(fd.get('kmIngreso'))||0,
      mecanico:(fd.get('mecanico')||'').trim(),
      fechaIngreso: fd.get('fechaIngreso')||todayISO(),
      fechaEntrega: fd.get('fechaEntrega')||'',
      descripcion:(fd.get('descripcion')||'').trim(),
      observaciones:(fd.get('observaciones')||'').trim(),
      linkFotos:(fd.get('linkFotos')||'').trim(),

    if(id){ Store.update('ots',id,payload); otId=id; }

    if(!id) navigate('ot-detail',{id:otId}); else renderView(state.view);
    toast(id?'OT actualizada':'OT creada');
  };
  $('#ot-save').onclick=save;
  form.onsubmit=e=>{ e.preventDefault(); save(); };
}

function eliminarOT(id){
  const o=Store.get('ots',id); if(!o) return;
  confirmDialog(`¿Eliminar la orden ${o.folio}? Se borrarán también sus tareas.`, ()=>{
    tareasDeOT(id).forEach(t=>Store.remove('tareas',t.id));

function addItem(otId, itemId){

  openModal(itemId?'Editar ítem':'Agregar ítem al presupuesto', `
    <form id="item-form">
      <div class="form-row">

        <input class="input" name="descripcion" autofocus value="${esc(it.descripcion||'')}" placeholder="Ej: Mantención 14.000 km / Neumático Dunlop / Mano de obra">
      </div>

        <label class="lbl">Monto (CLP) <span class="req">*</span></label>
        <input class="input" name="monto" type="number" min="0" value="${esc(it.monto||'')}" placeholder="0">
      </div>
    </form>`,
    `<button class="btn" data-close>Cancelar</button><button class="btn primary" id="item-save">Guardar</button>`);
  const save=()=>{
    const f=$('#item-form');
    const d=f.descripcion.value.trim(), monto=Number(f.monto.value)||0;
    if(!d){ toast('Escribe la descripción'); return; }

    closeModal(); renderView(state.view);
  };
  $('#item-save').onclick=save;
  $('#item-form').onsubmit=e=>{ e.preventDefault(); save(); };
}

function whatsappInforme(otId){
  const o=Store.get('ots',otId); if(!o) return;
  const m=Store.get('motos',o.motoId), c=Store.get('clientes',o.clienteId), t=taller();
  const items=itemsDeOT(otId), total=totalOT(otId);
  const lineas=items.map(it=>`• ${it.descripcion}: ${formatCLP(it.monto)}`).join('\n');
  const txt=`*${t.nombre}*${t.mecanico?`\n${t.mecanico}`:''}\n\n`+
    `Informe de servicio ${o.folio||''}\n`+
    `Moto: ${m?`${m.marca} ${m.modelo}`:''}${m&&m.patente?` (${m.patente})`:''}\n`+
    `Fecha: ${o.fechaIngreso||''} · ${Number(o.kmIngreso||0).toLocaleString('es-CL')} km\n\n`+
    (lineas?`*Trabajos realizados:*\n${lineas}\n\n`:'')+
    `*TOTAL: ${formatCLP(total)}*  (${estadoPagoOT(o)})\n`+
    (o.observaciones?`\nObservaciones: ${o.observaciones}\n`:'')+
    (o.linkFotos?`\nFotos: ${o.linkFotos}\n`:'')+
    `\n¡Gracias por confiar en nosotros!`;
  const phone=telWa(c?c.telefono:'');
  window.open('https://wa.me/'+phone+'?text='+encodeURIComponent(txt),'_blank');
}

/* ================== SINCRONIZACIÓN CON GOOGLE SHEETS ==================
   Espeja la arquitectura de Nexa: Google Identity Services (GIS) para el
   login + Sheets API v4 por fetch directo + push/pull MANUAL. Cada colección
   es una hoja. El sync es "el último que sube, manda" (sin merge fila a fila).
   ===================================================================== */
const GS = {
  token:null, tokenExpiry:null, clientId:'', sheetId:'',
  SCOPES:'https://www.googleapis.com/auth/spreadsheets',
  SHEETS:['Clientes','Motos','OTs','Tareas','Items','Config'],
};
const GS_HEADERS = {
  Clientes:['id','nombre','rut','telefono','email','createdAt'],
  Motos:['id','clienteId','marca','modelo','anio','patente','color','numeroMotor','numeroChasis','kmActual','historialDuenos','createdAt'],
  OTs:['id','motoId','clienteId','folio','tipo','estado','estadoPago','kmIngreso','mecanico','fechaIngreso','fechaEntrega','descripcion','observaciones','linkFotos','createdAt'],
  Tareas:['id','otId','descripcion','indicacion','hecha','comentario','createdAt'],
  Items:['id','otId','descripcion','monto','createdAt'],
  Config:['key','value'],
};
function gsCell(v){ if(v===undefined||v===null) return ''; if(typeof v==='object') return JSON.stringify(v); return String(v); }
function objToRow(obj,headers){ return headers.map(h=>gsCell(obj[h])); }
function rowToObj(row,headers){ const o={}; headers.forEach((h,i)=>{ o[h]=row[i]!==undefined?row[i]:''; }); return o; }
function parseColeccion(col, rows){
  if(col==='motos') rows.forEach(m=>{ m.kmActual=Number(m.kmActual)||0; try{ m.historialDuenos=m.historialDuenos?JSON.parse(m.historialDuenos):[]; }catch(e){ m.historialDuenos=[]; } if(m.createdAt) m.createdAt=Number(m.createdAt)||m.createdAt; });
  if(col==='ots') rows.forEach(o=>{ o.kmIngreso=Number(o.kmIngreso)||0; });
  if(col==='tareas') rows.forEach(t=>{ t.hecha=(t.hecha===true||t.hecha==='true'||t.hecha==='TRUE'); });
  if(col==='items') rows.forEach(it=>{ it.monto=Number(it.monto)||0; });
  return rows;
}

/* Config local de credenciales (NO se sube a Sheets) */
function gsExtractSheetId(v){ const m=/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/.exec(v); return m?m[1]:v; }
function gsSaveConfig(clientId, sheetId){ GS.clientId=clientId; GS.sheetId=sheetId; Store.data.gsConfig={clientId,sheetId}; Store.save(); }
function gsLoadConfig(){ const g=Store.data.gsConfig; if(g){ GS.clientId=g.clientId||''; GS.sheetId=g.sheetId||''; } }

/* Auth con Google Identity Services */
function gsSignIn(){
  if(!GS.clientId||!GS.sheetId){ syncStatus('Ingresa el Client ID y el link de la planilla primero.','err'); return; }
  if(!(window.google&&google.accounts&&google.accounts.oauth2)){ syncStatus('La librería de Google aún no termina de cargar. Espera unos segundos y reintenta.','warn'); return; }
  try{
    const client=google.accounts.oauth2.initTokenClient({
      client_id:GS.clientId, scope:GS.SCOPES,
      callback:(resp)=>{
        if(resp.error){ syncStatus('Error de autorización: '+resp.error,'err'); return; }
        GS.token=resp.access_token; GS.tokenExpiry=Date.now()+((resp.expires_in||3600)-60)*1000;
        syncStatus('Conectado a Google. La sesión dura ~1 hora.','ok'); updateSyncPill();
        if(state.view==='sync') renderSync();
      },
    });
    client.requestAccessToken();
  }catch(e){ syncStatus('No se pudo iniciar Google. Revisa el Client ID y el origen autorizado.','err'); }
}
function gsSignOut(){ try{ if(GS.token&&window.google) google.accounts.oauth2.revoke(GS.token,()=>{}); }catch(e){} GS.token=null; GS.tokenExpiry=null; updateSyncPill(); if(state.view==='sync') renderSync(); toast('Desconectado de Google'); }
function gsIsSignedIn(){ return !!(GS.token && Date.now()<GS.tokenExpiry); }

/* Llamadas a la Sheets API v4 */
async function gsRequest(method, endpoint, body){
  const url='https://sheets.googleapis.com/v4/spreadsheets/'+GS.sheetId+endpoint;
  const opts={ method, headers:{ 'Authorization':'Bearer '+GS.token, 'Content-Type':'application/json' } };
  if(body) opts.body=JSON.stringify(body);
  const res=await fetch(url,opts);
  if(!res.ok){ let m=res.statusText; try{ const e=await res.json(); m=(e.error&&e.error.message)||m; }catch(_){ } throw new Error(m); }
  return res.json();
}
async function gsEnsureSheets(){
  const meta=await gsRequest('GET','?fields=sheets.properties.title');
  const existing=(meta.sheets||[]).map(s=>s.properties.title);
  const toCreate=GS.SHEETS.filter(s=>!existing.includes(s));
  if(toCreate.length) await gsRequest('POST',':batchUpdate',{requests:toCreate.map(title=>({addSheet:{properties:{title}}}))});
}
async function gsWriteSheet(name, data, headers){
  await gsRequest('POST','/values/'+encodeURIComponent(name+'!A1:ZZ')+':clear',{});
  const rows=[headers, ...data.map(o=>objToRow(o,headers))];
  await gsRequest('PUT','/values/'+encodeURIComponent(name+'!A1')+'?valueInputOption=RAW',{range:name+'!A1',majorDimension:'ROWS',values:rows});
}
async function gsReadSheet(name, headers){
  const res=await gsRequest('GET','/values/'+encodeURIComponent(name+'!A1:ZZ'));
  if(!res.values||res.values.length<2) return [];
  return res.values.slice(1).map(r=>rowToObj(r,headers));
}

/* Subir / cargar */
async function gsUploadAll(){
  if(!gsIsSignedIn()){ syncStatus('Conéctate con Google primero.','warn'); return; }
  syncStatus('Subiendo datos a Google Sheets…','info');
  try{
    await gsEnsureSheets();
    const cfg=Store.config();
    await Promise.all([
      gsWriteSheet('Clientes', Store.all('clientes'), GS_HEADERS.Clientes),
      gsWriteSheet('Motos',    Store.all('motos'),    GS_HEADERS.Motos),
      gsWriteSheet('OTs',      Store.all('ots'),      GS_HEADERS.OTs),
      gsWriteSheet('Tareas',   Store.all('tareas'),   GS_HEADERS.Tareas),
      gsWriteSheet('Items',    Store.all('items'),    GS_HEADERS.Items),
      gsWriteSheet('Config', [
        {key:'tallerNombre',   value:cfg.nombre||''},
        {key:'tallerMecanico', value:cfg.mecanico||''},
        {key:'tallerTelefono', value:cfg.telefono||''},
        {key:'lastSync',       value:new Date().toISOString()},
      ], GS_HEADERS.Config),
    ]);
    Store.data.lastSync=new Date().toLocaleString('es-CL'); Store.save();
    syncStatus('✓ Datos subidos: '+Store.all('clientes').length+' clientes, '+Store.all('motos').length+' motos, '+Store.all('ots').length+' OTs.','ok');
    if(state.view==='sync') renderSync();
  }catch(e){ syncStatus('Error al subir: '+e.message,'err'); }
}
async function gsLoadAll(){
  if(!gsIsSignedIn()){ syncStatus('Conéctate con Google primero.','warn'); return; }
  if(!confirm('Esto reemplazará los datos de ESTE dispositivo con los de Google Sheets. ¿Continuar?')) return;
  syncStatus('Cargando datos desde Google Sheets…','info');
  try{
    const [cl,mo,ot,ta,it,cf]=await Promise.all([
      gsReadSheet('Clientes',GS_HEADERS.Clientes),
      gsReadSheet('Motos',   GS_HEADERS.Motos),
      gsReadSheet('OTs',     GS_HEADERS.OTs),
      gsReadSheet('Tareas',  GS_HEADERS.Tareas),
      gsReadSheet('Items',   GS_HEADERS.Items),
      gsReadSheet('Config',  GS_HEADERS.Config),
    ]);
    parseColeccion('motos',mo); parseColeccion('ots',ot); parseColeccion('tareas',ta); parseColeccion('items',it);
    Store.data.clientes=cl.filter(x=>x.id);
    Store.data.motos   =mo.filter(x=>x.id);
    Store.data.ots     =ot.filter(x=>x.id);
    Store.data.tareas  =ta.filter(x=>x.id);
    Store.data.items   =it.filter(x=>x.id);
    const cm={}; cf.forEach(r=>{ cm[r.key]=r.value; });
    Store.data.config=Object.assign({}, Store.data.config, {
      nombre:   cm.tallerNombre   || Store.data.config.nombre || '',
      mecanico: cm.tallerMecanico || Store.data.config.mecanico || '',
      telefono: cm.tallerTelefono || Store.data.config.telefono || '',
    });
    Store.data.lastSync=new Date().toLocaleString('es-CL');
    Store.save(); refreshCounts();
    syncStatus('✓ Datos cargados: '+Store.all('clientes').length+' clientes, '+Store.all('motos').length+' motos, '+Store.all('ots').length+' OTs.','ok');
    if(state.view==='sync') renderSync();
    toast('Datos sincronizados desde Sheets');
  }catch(e){ syncStatus('Error al cargar: '+e.message,'err'); }
}

/* UI */
function syncStatus(msg,type){ const el=document.getElementById('sync-status'); if(el){ el.style.display='block'; el.className='sync-status sync-'+(type||'info'); el.textContent=msg; } }
function updateSyncPill(){
  const pill=document.getElementById('sync-pill'); if(!pill) return;
  if(gsIsSignedIn()) pill.innerHTML='<span class="dot" style="background:var(--green);box-shadow:0 0 0 3px rgba(34,197,94,.18)"></span> Conectado a Sheets';
  else if(GS.clientId&&GS.sheetId) pill.innerHTML='<span class="dot" style="background:var(--blue)"></span> Sheets configurado';
  else pill.innerHTML='<span class="dot"></span> Solo local (sin sync)';
}
function gsSaveFromUI(thenConnect){
  const cid=($('#gs-client').value||'').trim();
  const sid=gsExtractSheetId(($('#gs-sheet').value||'').trim());
  if(!cid||!sid){ syncStatus('Completa el Client ID y el link de la planilla.','warn'); return; }
  gsSaveConfig(cid,sid); updateSyncPill();
  if(thenConnect) gsSignIn(); else { syncStatus('Credenciales guardadas.','ok'); }
}
function renderSync(){
  const el=$('#view-sync'); gsLoadConfig();
  const conf=!!(GS.clientId&&GS.sheetId), conn=gsIsSignedIn();
  el.innerHTML=`
    <div class="card" style="margin-bottom:16px">
      <div class="panel-head"><h3>Conexión con Google Sheets</h3>
        <span class="tag ${conn?'orange':'gray'}">${conn?'Conectado':(conf?'Configurado':'Sin configurar')}</span></div>
      <div style="padding:18px">
        <div class="form-row"><label class="lbl">Client ID de Google Cloud</label>
          <input class="input" id="gs-client" value="${esc(GS.clientId)}" placeholder="xxxxxxxx.apps.googleusercontent.com"></div>
        <div class="form-row"><label class="lbl">Planilla de Google (pega el link completo o el ID)</label>
          <input class="input" id="gs-sheet" value="${esc(GS.sheetId)}" placeholder="https://docs.google.com/spreadsheets/d/…/edit"></div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px">
          <button class="btn" onclick="gsSaveFromUI(false)">Guardar credenciales</button>
          ${conn? `<button class="btn danger" onclick="gsSignOut()">Desconectar</button>`
                : `<button class="btn primary" onclick="gsSaveFromUI(true)">Conectar con Google</button>`}
        </div>
        <div id="sync-status" class="sync-status" style="display:none;margin-top:14px"></div>
      </div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div class="panel-head"><h3>Sincronizar</h3>
        ${Store.data.lastSync?`<span style="color:var(--text-dim);font-size:12px">Última vez: ${esc(Store.data.lastSync)}</span>`:''}</div>
      <div style="padding:18px;display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn primary" ${conn?'':'disabled'} onclick="gsUploadAll()">&#11014;&#65039; Subir todo a Sheets</button>
        <button class="btn" ${conn?'':'disabled'} onclick="gsLoadAll()">&#11015;&#65039; Cargar desde Sheets</button>
      </div>
      <div style="padding:0 18px 16px;color:var(--text-dim);font-size:12.5px;line-height:1.7">
        <strong>Primera vez:</strong> conéctate y usa “Subir todo a Sheets” para crear las hojas y volcar tus datos.<br>
        <strong>Día a día (varios dispositivos):</strong> al empezar en un equipo usa “Cargar desde Sheets”; al terminar, “Subir todo”. El último que sube es el que queda.
      </div>
    </div>

    <div class="card">
      <div class="panel-head"><h3>Cómo dejarlo funcionando (una sola vez)</h3></div>
      <div style="padding:18px;color:var(--text-dim);font-size:13px;line-height:1.8">
        1. En <strong>Google Cloud</strong>, crea un “ID de cliente OAuth” tipo <em>Aplicación web</em> y agrega la URL de esta app (tu GitHub Pages) en <em>Orígenes autorizados de JavaScript</em>.<br>
        2. Activa la <strong>API de Google Sheets</strong> en ese mismo proyecto.<br>
        3. Crea una <strong>planilla</strong> en Google Sheets y copia su link.<br>
        4. Pega el Client ID y el link aquí arriba, guarda y conéctate.<br>
        <span style="color:var(--accent-2)">Si esta app vive en el mismo dominio que Nexa (tu-usuario.github.io), puedes reutilizar el mismo Client ID.</span>
      </div>
    </div>

    <div class="card" style="border-color:rgba(239,68,68,.4)">
      <div class="panel-head"><h3 style="color:var(--red)">Zona de peligro</h3></div>
      <div style="padding:18px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap">
        <div style="color:var(--text-dim);font-size:12.5px;line-height:1.6;max-width:520px">
          Borra todos los clientes, motos, órdenes, tareas y presupuestos de <strong>este dispositivo</strong> para empezar de cero (útil tras las pruebas). Se mantienen los datos del taller y la conexión con Google. Para vaciar también la planilla, luego usa “Subir todo a Sheets”.
        </div>
        <button class="btn danger" style="border:1px solid rgba(239,68,68,.5)" onclick="borrarTodo()">Borrar todo</button>
      </div>
    </div>`;
  updateSyncPill();
}
function initGS(){ gsLoadConfig(); updateSyncPill(); }

/* Borrar todos los datos locales (clientes/motos/OTs/tareas/items).
   Conserva la config del taller y las credenciales de Google. */
function borrarTodo(){
  if(!confirm('Esto borrará TODOS los clientes, motos, órdenes, tareas y presupuestos de este dispositivo. Tus datos del taller y la conexión con Google se mantienen. ¿Continuar?')) return;
  if(!confirm('Última confirmación: esta acción no se puede deshacer. ¿Borrar todo?')) return;
  Store.data.clientes=[]; Store.data.motos=[]; Store.data.ots=[]; Store.data.tareas=[]; Store.data.items=[];
  Store.save(); refreshCounts();
  if(state.view==='sync') renderSync();
  toast('Datos borrados. Para dejar la planilla también vacía, usa "Subir todo a Sheets".');
}
